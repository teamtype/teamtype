[graph]
all-features = true
exclude-dev = true

[bans]
multiple-versions = "allow"

[advisories]
ignore = [
    "RUSTSEC-2023-0089", # unmaintained: atomic-polyfill (via iroh and postcard)
    "RUSTSEC-2024-0384", # unmaintained: instant (via iroh)
    "RUSTSEC-2024-0436", # unmaintained: paste (via iroh)
    "RUSTSEC-2026-0049", # vulnerable: rustls-webpki (via iroh)
    "RUSTSEC-2026-0097", # unsound: rand (via iroh)
    "RUSTSEC-2026-0098", # vulnerable: rustls-webpki (via iroh)
    "RUSTSEC-2026-0099", # vulnerable: rustls-webpki (via iroh)
]

# Not exhaustive, just whitelist the current dependency tree
[licenses]
allow = [
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = [
    # only AGPL compatible because it has the necessary extra clause
    { allow = ["EUPL-1.2"], crate = "magic-wormhole" },
]
