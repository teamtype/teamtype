name: General tests

on:
  push:
    branches:
      - 'main'
    paths:
      - 'crates/**'
      - 'nvim-plugin/**'
      - '.github/workflows/general.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'nvim-plugin/**'
      - '.github/workflows/general.yml'

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_DEBUG: 0 # See https://corrode.dev/blog/tips-for-faster-ci-builds/

jobs:
  build_and_test:
    name: Run tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        nvim-version: [v0.9.5, v0.10.4, v0.11.2]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build Teamtype
        run: cargo build --release
      - name: Add teamtype binary to PATH
        run: echo "$PWD/target/release" >> $GITHUB_PATH
      - run: teamtype --version
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}
      - run: nvim --version
      - name: Compile unit tests
        run: cargo test --no-default-features --no-run --locked
      - name: Run unit tests
        run: cargo test --no-default-features
      - name: Compile integration tests
        run: cargo test -p integration-tests --no-run --locked
      - if: ${{ matrix.os == 'ubuntu-latest' && matrix.nvim-version == 'v0.10.4' }}
        name: Run integration tests
        run: cargo test -p integration-tests --locked
      - if: ${{ matrix.os != 'ubuntu-latest' || matrix.nvim-version != 'v0.10.4' }}
        name: Run integration tests (except fuzzer)
        run: cargo test -p integration-tests --locked --test nvim-plugin

  check_formatting:
    name: Check Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --check

  clippy:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: --deny warnings
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        run: rustup toolchain install stable --profile minimal --component=clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --all-targets --all-features
      - run: cargo doc --no-deps --all-features
